name: Diagnostic (temp)
on:
  workflow_dispatch:
    inputs:
      test_email:
        description: 'Email do usuario para teste de upload'
        required: false
        default: ''
      test_password:
        description: 'Senha do usuario para teste de upload'
        required: false
        default: ''
jobs:
  diagnose:
    runs-on: self-hosted
    steps:
      - name: 1 - Versao de arquivos.py no servidor
        shell: powershell
        run: |
          $f = "C:\emals-app\backend\routers\arquivos.py"
          Write-Host "=== HEAD (primeiras 25 linhas) ==="
          Get-Content $f | Select-Object -First 25
          Write-Host ""
          Write-Host "=== Contem storage/v1 ? ==="
          $hits = Select-String -Path $f -Pattern "storage/v1" -SimpleMatch
          if ($hits) { $hits | ForEach-Object { Write-Host $_.Line } }
          else { Write-Host "NAO ENCONTRADO - ainda versao disco local" }

      - name: 2 - Chaves SUPABASE no .env do servidor
        shell: powershell
        run: |
          $env_path = "C:\emals-app\backend\.env"
          if (Test-Path $env_path) {
            Write-Host "=== .env existe ==="
            Get-Content $env_path | ForEach-Object {
              if ($_ -match "^(SUPABASE_URL|SUPABASE_SERVICE_KEY|DATABASE_URL)=") {
                $parts = $_ -split "=", 2
                $val = $parts[1]
                $shown = $val.Substring(0, [Math]::Min(40, $val.Length))
                Write-Host "$($parts[0])=$shown..."
              }
            }
          } else {
            Write-Host ".env NAO ENCONTRADO em $env_path"
          }

      - name: 3 - Ultimas 40 linhas do log de erro
        shell: powershell
        run: |
          $log = "C:\emals-service\logs\emals-backend.err.log"
          if (Test-Path $log) {
            Write-Host "=== $log (tail 40) ==="
            Get-Content $log -Tail 40
          } else {
            Write-Host "Log NAO ENCONTRADO: $log"
            Write-Host "Arquivos em C:\emals-service\logs\:"
            Get-ChildItem "C:\emals-service\logs\" -ErrorAction SilentlyContinue
          }

      - name: 4 - Verificar sequence arquivos_id_seq
        shell: powershell
        run: |
          $py = "C:\emals-app\backend\venv\Scripts\python.exe"
          $script = @"
import os, sys
from dotenv import load_dotenv
load_dotenv(r'C:\emals-app\backend\.env', override=True)
db_url = os.getenv('DATABASE_URL', '')
if 'sqlite' in db_url:
    print('ERRO: DATABASE_URL aponta para SQLite, nao PostgreSQL')
    sys.exit(1)
import psycopg2
# Extrair conn string do DATABASE_URL
conn = psycopg2.connect(db_url)
cur = conn.cursor()
cur.execute("SELECT MAX(id) FROM arquivos")
max_id = cur.fetchone()[0] or 0
cur.execute("SELECT last_value FROM arquivos_id_seq")
seq_val = cur.fetchone()[0]
print(f'MAX(id) na tabela: {max_id}')
print(f'Valor atual da sequence: {seq_val}')
if seq_val >= max_id:
    print('OK: sequence esta sincronizada (seq >= max_id)')
else:
    print(f'PROBLEMA: sequence ({seq_val}) menor que max_id ({max_id})')
conn.close()
"@
          & $py -c $script

      - name: 5 - Teste de upload (se credenciais fornecidas)
        if: ${{ inputs.test_email != '' && inputs.test_password != '' }}
        shell: powershell
        run: |
          $py = "C:\emals-app\backend\venv\Scripts\python.exe"
          $email = "${{ inputs.test_email }}"
          $password = "${{ inputs.test_password }}"
          $script = @"
import httpx, json, sys

base = 'http://localhost:8000'

# Login
r = httpx.post(f'{base}/api/auth/login', data={'username': '$email', 'password': '$password'})
if r.status_code != 200:
    print(f'ERRO login: {r.status_code} {r.text[:200]}')
    sys.exit(1)
token = r.json()['access_token']
print(f'Login OK, token obtido')

# Buscar primeiro cliente
headers = {'Authorization': f'Bearer {token}'}
r2 = httpx.get(f'{base}/api/clientes', headers=headers)
if r2.status_code != 200 or not r2.json():
    print(f'ERRO ao listar clientes: {r2.status_code}')
    sys.exit(1)
cliente_id = r2.json()[0]['id']
print(f'Usando cliente_id={cliente_id}')

# Upload de arquivo de teste
import io
conteudo = b'Arquivo de teste - pode deletar'
files = {'arquivo': ('teste_diagnostico.txt', io.BytesIO(conteudo), 'text/plain')}
r3 = httpx.post(f'{base}/api/arquivos/cliente/{cliente_id}', headers=headers, files=files)
if r3.status_code == 201:
    dados = r3.json()
    print(f'UPLOAD OK: id={dados[\"id\"]}, nome={dados[\"nome_original\"]}')
else:
    print(f'ERRO upload: {r3.status_code} {r3.text[:300]}')
    sys.exit(1)
"@
          & $py -c $script
