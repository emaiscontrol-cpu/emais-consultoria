name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: "frontend/.nvmrc"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências do frontend
        working-directory: frontend
        run: npm ci

      - name: Build do frontend (gera frontend/dist atualizado)
        working-directory: frontend
        run: npm run build

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Instalar dependências do backend
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Rodar suíte de testes (backend + integração frontend/dist)
        run: pytest tests/ -v --tb=short

  # Job único exigido pela branch protection — bloqueia o merge se "test" falhar.
  ci-status:
    runs-on: ubuntu-latest
    needs: [test]
    if: always()
    steps:
      - name: Verificar resultado dos testes
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "Testes falharam — merge bloqueado."
            exit 1
          fi
          echo "Todos os testes passaram."
