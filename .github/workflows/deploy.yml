name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Permissão de diretório
        run: git config --global --add safe.directory C:/emals-app

      - name: Atualizar código
        working-directory: C:\emals-app
        run: git pull origin main

      - name: Reiniciar backend
        run: |
          Stop-Service EmaisBackend -Force -ErrorAction SilentlyContinue
          $svc = Get-Service EmaisBackend
          $svc.WaitForStatus('Stopped', '00:00:30')
          Start-Sleep -Seconds 2
          Start-Service EmaisBackend
        shell: powershell
